name: Update History Data

on:
  schedule:
    # 每天北京时间 17:00（UTC 09:00）更新，交易所收盘后
    - cron: '0 9 * * 1-5'
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install AKShare
        run: pip install akshare --upgrade

      - name: Fetch latest data
        run: python scripts/fetch_cn_history.py

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          if git diff --staged --quiet; then
            echo "No data changes"
          else
            git commit -m "chore: update gold/silver history data $(date +%Y-%m-%d)"
            git push
          fi
